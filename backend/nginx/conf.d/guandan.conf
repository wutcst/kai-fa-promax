# 掼蛋游戏后端Nginx配置（生产环境）
# 接口字段说明：
#   server_name — 服务器域名，默认 localhost，生产环境需替换
#   listen 80 — HTTP 监听端口
# 异常场景：
#   - 后端服务未启动时所有 location 返回 502 Bad Gateway
#   - WebSocket 握手失败时连接立即断开，需检查 proxy_http_version 1.1

# 全局配置：限流区域定义
# 接口字段：limit_req_zone — 按 IP 限流，zone 名称为 api_limit
# 异常场景：突发流量超过 burst → Nginx 返回 503，保护后端不被冲垮
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# 接口字段：limit_conn_zone — 按 IP 限制并发连接数
# 异常场景：单个 IP 并发连接超过限制 → Nginx 返回 503
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# SSL 会话缓存（全局）
# 接口字段：ssl_session_cache — 复用 SSL 握手参数，减少握手开销
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name guandan.game.example.com;
    # 生产环境开启 HTTPS 重定向
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器配置
server {
    listen 443 ssl http2;
    server_name guandan.game.example.com;

    # SSL 证书配置
    # 接口字段：ssl_certificate — PEM 格式证书路径
    # 异常场景：证书文件不存在或格式错误 → Nginx 启动失败
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL 协议与加密套件
    # 接口字段：ssl_protocols — 仅允许 TLSv1.2 和 TLSv1.3
    # 异常场景：客户端使用 TLSv1.1 及以下 → 握手失败，连接拒绝
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;

    # HSTS（HTTP Strict Transport Security）
    # 接口字段：max-age=31536000 — 强制浏览器在1年内仅使用 HTTPS
    # 异常场景：首次访问 HTTP 时，301 后浏览器记录 HSTS，后续自动 HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 全局安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 禁止空 Host 头访问
    if ($host = "") {
        return 444;
    }

    # ============================================================
    # 主路由：前端静态资源 / API 代理
    # ============================================================
    location / {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 限流
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 100;
    }

    # ============================================================
    # API 接口（带限流保护）
    # ============================================================
    # 接口字段：proxy_pass http://backend:8081 — 后端地址
    # 异常场景：
    #   - 后端返回 5xx → Nginx 透传状态码至客户端
    #   - 请求体 Content-Length 为 0 且为 POST → Nginx 拦截返回 400
    location /api {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 严格限流：API 接口限制 30r/s，突发允许 50
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 50;

        # 禁止空请求体 POST（防重复提交）
        if ($request_method = POST) {
            set $check_body $http_content_length;
        }
        if ($check_body = "") {
            return 400;
        }

        # 异常场景：请求体过大 → 413 Request Entity Too Large
        client_max_body_size 10m;
    }

    # ============================================================
    # WebSocket 连接
    # ============================================================
    # 接口字段：proxy_read_timeout 7d — WebSocket 长连接超时设为7天
    # 异常场景：
    #   - 后端 WebSocket 服务断开 → 返回 502
    #   - 客户端 7 天内无数据交互 → Nginx 主动断开连接
    location /ws {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # WebSocket 不应用 HTTP 限流
    }

    # ============================================================
    # 健康检查
    # ============================================================
    # 接口字段：access_log off — 健康检查请求不记录访问日志
    # 异常场景：后端 health 端点返回非 200 → 负载均衡器摘除该节点
    location /actuator/health {
        proxy_pass http://backend:8081;
        access_log off;
        # 健康检查不限制速率，避免误判
    }
}