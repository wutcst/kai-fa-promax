# 掼蛋游戏后端Nginx配置
# 接口字段说明：
#   server_name — 服务器域名，默认 localhost，生产环境需替换
#   listen 80 — HTTP 监听端口
# 异常场景：
#   - 后端服务未启动时所有 location 返回 502 Bad Gateway
#   - WebSocket 握手失败时连接立即断开，需检查 proxy_http_version 1.1

# HTTP服务器配置
server {
    listen 80;
    server_name localhost;

    # 重定向到HTTPS（如果配置了SSL）
    # return 301 https://$server_name$request_uri;

    # 或者直接使用HTTP（开发环境）
    location / {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 安全响应头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 禁止空 Host 头访问
        if ($host = "") {
            return 444;
        }
    }

    # API接口
    # 接口字段：proxy_pass http://backend:8081 — 后端地址
    # 异常场景：
    #   - 后端返回 5xx → Nginx 透传状态码至客户端
    #   - 请求体 Content-Length 为 0 且为 POST → Nginx 拦截返回 400
    location /api {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁止空请求体 POST（防重复提交）
        if ($request_method = POST) {
            set $check_body $http_content_length;
        }
        if ($check_body = "") {
            return 400;
        }
    }

    # WebSocket连接
    # 接口字段：proxy_read_timeout 7d — WebSocket 长连接超时设为7天
    # 异常场景：
    #   - 后端 WebSocket 服务断开 → 返回 502
    #   - 客户端 7 天内无数据交互 → Nginx 主动断开连接
    location /ws {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket超时设置
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # 健康检查
    # 接口字段：access_log off — 健康检查请求不记录访问日志
    # 异常场景：后端 health 端点返回非 200 → 负载均衡器摘除该节点
    location /actuator/health {
        proxy_pass http://backend:8081;
        access_log off;
    }
}

