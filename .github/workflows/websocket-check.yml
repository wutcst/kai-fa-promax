name: WebSocket Connection Check

on:
  push:
    branches:
      - master
      - backend
    paths:
      - 'backend/**'
      - 'pom.xml'
      - '.github/workflows/websocket-check.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'pom.xml'
      - '.github/workflows/websocket-check.yml'
  schedule:
    # 每日凌晨2点执行WebSocket连接检查
    - cron: '0 2 * * *'

  # 手动触发支持
  workflow_dispatch:
    inputs:
      websocket_url:
        description: 'WebSocket 服务端地址'
        required: false
        default: 'ws://localhost:8080/ws/game'
        type: string
      test_duration:
        description: '连接测试持续时间（秒）'
        required: false
        default: '10'
        type: string
      log_level:
        description: '日志级别'
        required: true
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # WebSocket 连接检查环境变量
  WS_CHECK_URL: ${{ inputs.websocket_url || 'ws://localhost:8080/ws/game' }}
  WS_CHECK_TIMEOUT: ${{ inputs.test_duration || '10' }}
  WS_CHECK_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  # 后端测试环境变量
  JAVA_OPTS: '-Xmx512m -Xms256m'
  BACKEND_PORT: '8080'

jobs:
  websocket-check:
    runs-on: ubuntu-latest

    services:
      # 启动一个简单的WebSocket echo服务用于测试
      websocket-server:
        image: jmalloc/echo-server:latest
        ports:
          - 8080:8080

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile Backend
        run: mvn compile -f backend/pom.xml --no-transfer-progress

      - name: Start Backend Application
        run: |
          mvn spring-boot:run -f backend/pom.xml --no-transfer-progress &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          echo "WS_URL=$WS_CHECK_URL" >> $GITHUB_ENV
          # 等待应用启动，最多30次检测
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:${BACKEND_PORT:-8080} 2>/dev/null | grep -qE '^(200|302)$'; then
              echo "应用已启动"
              break
            fi
            sleep 2
          done
          echo "等待WebSocket服务就绪..."
          sleep 5

      - name: Install WebSocket Test Tools
        run: |
          npm install -g wscat

      - name: Test WebSocket Connection
        run: |
          # 测试WebSocket连接是否正常
          echo "Testing WebSocket connection..."
          echo "URL: $WS_CHECK_URL"
          echo "Timeout: $WS_CHECK_TIMEOUT"
          # 先检查服务端口是否监听
          timeout 5 bash -c 'while ! curl -s -o /dev/null http://localhost:${BACKEND_PORT:-8080}; do sleep 1; done' 2>/dev/null || echo "HTTP服务未就绪，跳过HTTP检查"
          # 测试WebSocket连接
          timeout $WS_CHECK_TIMEOUT wscat -c "$WS_CHECK_URL" -w 3 -x '{"type":"ping"}' 2>&1 || echo "WebSocket连接测试完成（非必成功，仅记录）"

      - name: Cleanup
        if: always()
        run: |
          if [ -n "$APP_PID" ]; then
            kill $APP_PID 2>/dev/null || true
          fi
