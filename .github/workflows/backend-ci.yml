name: backend-ci

on:
  pull_request:
    branches: [ "master" ]
    paths: [ "backend/**", ".github/workflows/backend-ci.yml" ]
  push:
    branches: [ "master", "feature/**" ]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build backend
        working-directory: backend
        run: |
          if [ -f pom.xml ]; then mvn -q -DskipTests package; else echo "backend not ready"; fi
