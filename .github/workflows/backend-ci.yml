name: Backend CI Build

on:
  push:
    branches:
      - master
      - backend
    paths:
      - 'backend/**'
      - 'pom.xml'
  pull_request:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'pom.xml'

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Backend
        run: mvn compile -f backend/pom.xml --no-transfer-progress
