name: Backend CI

on:
  push:
    branches:
      - master
      - backend
    paths:
      - 'backend/**'
      - 'pom.xml'
  pull_request:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'pom.xml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn compile -f backend/pom.xml --no-transfer-progress
