name: Release Auto Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (eg: v1.0.0)'
        required: true
        default: 'v1.0.0'

# ============================================================
# Release 自动发布流水线
# 产品目标:
#   提供一键式版本发布能力，确保每次 Tag 推送自动触发构建、
#   收集制品并创建 GitHub Release，降低人工操作遗漏风险。
# 验收标准:
#   1. 任意 v* Tag 推送触发流水线
#   2. 后端 Maven 编译成功，前端 npm 构建成功
#   3. 制品归档至 release-artifacts 目录
#   4. GitHub Release 创建成功，附件包含 JAR 和前端构建产物
# 回归验证点:
#   [TC-REL-001] 推送 v* Tag → 自动触发 release.yml 流水线
#   [TC-REL-002] 手动触发 workflow_dispatch → 填写版本号后执行
#   [TC-REL-003] 后端 Maven 编译 → JAR 包生成至 target/
#   [TC-REL-004] 前端 npm 构建 → dist/ 目录产物完整
#   [TC-REL-005] 制品收集 → release-artifacts/ 包含 JAR + frontend-dist
#   [TC-REL-006] GitHub Release 创建 → 附件包含上述制品
#   [TC-REL-007] Release body 引用 CHANGELOG.md 内容
#   [TC-REL-008] 非 v* 标签推送 → 不触发流水线
# 阶段边界:
#   Phase 2 — 发布工程基建
#   后续 Phase 3 将在此基础增加:
#     - 自动生成 CHANGELOG
#     - 集成测试门禁
#     - Docker 镜像签名
# 请求参数:
#   version (required): 发布版本号，格式 v<major>.<minor>.<patch>
# 返回结构:
#   - status: success | failure
#   - release_tag: 实际创建的 Git Tag
#   - release_url: GitHub Release 页面 URL
#   - artifacts:
#       - backend_jar: 后端 JAR 包路径
#       - frontend_dist: 前端构建产物路径
# ============================================================
env:
  RELEASE_ARTIFACT_DIR: ./release-artifacts

jobs:
  # ===== 职责：版本发布总入口 =====
  # 触发条件：v* Tag 推送或手动触发
  # 方法命名原则：publish-{artifact-type}
  # 职责边界：编排构建、制品收集与 Release 创建全流程
  publish-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        # 职责：编译后端 JAR 包
        # 边界：仅编译，不运行集成测试（依赖外部服务）
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        # 职责：构建前端静态资源
        # 边界：仅构建生产版本，不做 E2E 测试
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Collect release artifacts
        # 职责：汇总构建产物至发布目录
        # 边界：仅收集后端 JAR 和前端 dist，不含测试报告
        run: |
          mkdir -p ${{ env.RELEASE_ARTIFACT_DIR }}
          cp backend/target/guandan-backend-*.jar ${{ env.RELEASE_ARTIFACT_DIR }}/
          cp -r frontend/dist ${{ env.RELEASE_ARTIFACT_DIR }}/frontend-dist

      - name: Create Release
        # 职责：创建 GitHub Release 并上传制品
        # 边界：不负责 Docker 镜像推送（由 docker-build.yml 独立负责）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            ${{ env.RELEASE_ARTIFACT_DIR }}/guandan-backend-*.jar
            ${{ env.RELEASE_ARTIFACT_DIR }}/frontend-dist/**/*

  # ===== 回归验证点汇总 =====
  # TC-REL-001  ✅ 已实现 — on.push.tags: 'v*' 触发
  # TC-REL-002  ✅ 已实现 — workflow_dispatch 手动触发
  # TC-REL-003  ✅ 已实现 — Build backend with Maven 步骤
  # TC-REL-004  ✅ 已实现 — Build frontend 步骤
  # TC-REL-005  ✅ 已实现 — Collect release artifacts 步骤
  # TC-REL-006  ✅ 已实现 — Create Release 步骤 (softprops/action-gh-release)
  # TC-REL-007  ✅ 已实现 — body_path: CHANGELOG.md
  # TC-REL-008  ✅ 已验证 — 非 v* 标签跳过此 workflow
