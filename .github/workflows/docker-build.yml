name: docker-build
on:
  pull_request:
    branches: [ "master" ]
    paths: [ "backend/Dockerfile", "docker-compose.yml", "backend/nginx/**" ]
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: |
          if [ -f backend/Dockerfile ]; then docker build -t guandan-backend:test backend; else echo "no Dockerfile"; fi
