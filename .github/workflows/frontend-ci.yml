name: Frontend CI Pipeline

# ============================================================
# 前端 CI 编译验证流水线
# 验证点：
# 1. Lint Check  —— ESLint 代码规范检查（非阻塞警告）
# 2. Build       —— npm run build 编译，验证 dist/ 产物
# 3. Type Check  —— vue-tsc 类型检查（非阻塞警告）
# Action 运行结果：通过 Frontend CI Pipeline 页面查看
# ============================================================

on:
  push:
    branches:
      - master
      - frontend
      - 'feature/frontend-**'
      - 'fix/frontend-**'
      - 'refactor/frontend-**'
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - master
      - frontend
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

  # 手动触发支持
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js 版本'
        required: true
        default: '20'
        type: choice
        options:
          - 18
          - 20
          - 22
      lint_only:
        description: '仅运行 Lint 检查'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # Job 1: 代码规范检查
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.lint_only || inputs.lint_only == false }}

    strategy:
      matrix:
        node-version: [${{ inputs.node_version || '20' }}]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run ESLint
        run: npx eslint --ext .vue,.js src/ || echo "Lint warnings found (non-blocking)"
        working-directory: frontend
        continue-on-error: true

  # Job 2: 项目构建
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend

      - name: Verify Build Output
        run: |
          if [ -d "dist" ]; then
            echo "Build output exists at dist/"
            ls -la dist/
            echo "Build artifact count: $(find dist/ -type f | wc -l)"
          else
            echo "No dist/ directory found"
            exit 1
          fi
        working-directory: frontend

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error

  # Job 3: TypeScript 类型检查
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.lint_only }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vue Type Check
        run: npx vue-tsc --noEmit || echo "Type check warnings found (non-blocking)"
        working-directory: frontend
        continue-on-error: true
