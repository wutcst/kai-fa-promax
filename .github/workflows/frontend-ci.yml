name: frontend-ci
on:
  pull_request:
    branches: [ "master" ]
    paths: [ "frontend/**", ".github/workflows/frontend-ci.yml" ]
  push:
    branches: [ "master", "feature/p2-**" ]
jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: |
          if [ -f package.json ]; then npm install && npm run build --if-present; else echo "frontend not ready"; fi
