# ============================================================
# 回归验证点: 提升发布可用性
# ============================================================
# [RV-DC-001] Docker Compose 启动: docker compose up -d
#   → 预期: mysql、redis、backend、frontend 全部正常运行
# [RV-DC-002] 服务依赖顺序: backend 在 mysql healthy 之前等待，
#   frontend 在 backend 启动后启动
# [RV-DC-003] 端口映射: 宿主机 3307→3306(MySQL)、6379→6379(Redis)、
#   8081→8081(backend)、5173→5173(frontend) 映射正确
# [RV-DC-004] 数据持久化: docker compose down 后 volume 数据不丢失，
#   docker compose up -d 恢复后数据完整
# [RV-DC-005] 部署脚本: deploy.sh 执行后服务正常启动，rollback.sh
#   执行后回滚到上一版本
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: guandan-mysql
    # 接口字段：restart: unless-stopped — 非手动停止时自动重启
    # 异常场景：MySQL 崩溃后自动重启，数据由 volume 持久化
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: guandan
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"  # 接口字段：宿主机3307映射容器3306，避免与本地MySQL冲突
    volumes:
      - mysql_data:/var/lib/mysql  # 接口字段：持久化数据库文件
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/add_card_deal_table.sql:/docker-entrypoint-initdb.d/02-add-card-deal-table.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      # 异常场景：healthcheck 超时（timeout:5s）→ MySQL 未就绪，backend 等待
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: guandan-redis
    # 接口字段：appendonly yes — 启用 AOF 持久化
    # 异常场景：Redis 宕机后重启，AOF 文件恢复数据；无 AOF 则缓存数据丢失
    restart: unless-stopped
    ports:
      - "6379:6379"  # 接口字段：宿主机6379映射容器6379，默认端口
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data  # 接口字段：持久化 AOF 和 RDB 文件
    healthcheck:
      # 异常场景：Redis 健康检查失败 → backend 依赖等待，不会启动
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: guandan-backend:latest
    container_name: guandan-backend
    restart: unless-stopped
    volumes:
      - backend_logs:/app/logs  # 接口字段：日志卷挂载，持久化运行日志
      - backend_data:/app/data  # 接口字段：数据卷挂载，持久化临时数据
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/guandan?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: guandan-game-jwt-secret-key-2026-for-demo-only
      AGENT_AUTH_ENABLED: "true"
      AGENT_AUTH_TOKEN: "ef3d2be730653f780b57ca3b29a8e38b556bde16b5a8560b9a7afe232a5eae6b"
      AGENT_AUTH_USER_ID: "100000"
      AGENT_AUTH_USERNAME: "999999"
      TZ: Asia/Shanghai
      # 健康检查重试与超时配置
      HEALTHCHECK_RETRIES: "10"
      HEALTHCHECK_TIMEOUT: "30s"
      # 部署环境标识
      DEPLOY_ENV: "production"
      # 日志级别
      LOGGING_LEVEL_ROOT: "INFO"
      LOGGING_FILE_PATH: "/app/logs/guandan.log"
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # 异常场景：应用启动超时（start-period=90s）内连续检测失败 → 标记 unhealthy
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      start-period: 90s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: guandan-nginx
    restart: unless-stopped
    volumes:
      - ./backend/nginx/conf.d:/etc/nginx/conf.d:ro  # 接口字段：Nginx 配置挂载
      - nginx_logs:/var/log/nginx  # 接口字段：Nginx 日志卷挂载
    ports:
      - "80:80"    # 接口字段：HTTP 端口
      - "443:443"  # 接口字段：HTTPS 端口（预留）
    depends_on:
      backend:
        condition: service_healthy
    # 异常场景：后端全部不可用 → Nginx 返回 502，不对外暴露后端重启细节
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

  frontend:
    image: node:22-alpine
    container_name: guandan-frontend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: "/api"  # 接口字段：通过 Nginx 转发 API 请求
    ports:
      - "5173:5173"
    depends_on:
      - nginx

volumes:
  mysql_data:
  redis_data:
  maven_repo:
  frontend_node_modules:
  backend_logs:       # 接口字段：后端日志持久化卷
  backend_data:       # 接口字段：后端数据持久化卷
  nginx_logs:         # 接口字段：Nginx 日志持久化卷